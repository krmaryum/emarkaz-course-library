<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ای مرکز کتابیں | eMarkaz Course Library</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: Arial, "Noto Nastaliq Urdu", "Jameel Noori Nastaleeq", sans-serif;
      background:linear-gradient(135deg,#f8fafc,#ecfeff);
      color:#111827;
      min-height:100vh;
      line-height:1.9;
      padding:30px;
    }
    .container { max-width:1180px; margin:auto; }
    .top-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }
    .back {
      display:inline-block;
      background:#064e3b;
      color:white;
      padding:10px 18px;
      border-radius:12px;
      text-decoration:none;
      font-weight:bold;
      margin-left:8px;
    }
    .badge {
      background:#d1fae5;
      color:#065f46;
      padding:8px 16px;
      border-radius:999px;
      font-weight:bold;
      border:1px solid #a7f3d0;
      direction:ltr;
    }
    .hero {
      text-align:center;
      margin-bottom:35px;
      padding:35px 20px;
      background:white;
      border-radius:24px;
      box-shadow:0 15px 40px rgba(0,0,0,.08);
      border:1px solid #e5e7eb;
    }
    .hero h1 {
      font-size:clamp(32px,5vw,56px);
      color:#064e3b;
      margin-bottom:10px;
    }
    .hero h2 {
      font-size:24px;
      color:#374151;
      margin-bottom:0;
      direction:ltr;
    }
    .section-title {
      color:#064e3b;
      margin:30px 0 18px;
      font-size:30px;
    }
    .books-grid,.folders-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:22px;
    }
    .book-card,.folder-card,.empty-card {
      background:white;
      border-radius:22px;
      padding:24px;
      border:1px solid #e5e7eb;
      box-shadow:0 12px 30px rgba(0,0,0,.07);
      transition:.3s ease;
    }
    .book-card:hover,.folder-card:hover {
      transform:translateY(-6px);
      box-shadow:0 20px 45px rgba(6,95,70,.16);
      border-color:#10b981;
    }
    .file-type {
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#ecfdf5;
      color:#065f46;
      padding:6px 12px;
      border-radius:999px;
      font-weight:800;
      font-size:13px;
      margin-bottom:14px;
      direction:ltr;
    }
    .book-card h3,.folder-card h3 {
      font-size:22px;
      color:#111827;
      margin-bottom:12px;
      min-height:55px;
    }
    .english {
      font-family:Arial,sans-serif;
      direction:ltr;
      color:#4b5563;
      margin-bottom:16px;
    }
    .buttons { display:flex; gap:10px; flex-wrap:wrap; }
    .btn {
      display:inline-block;
      padding:10px 16px;
      border-radius:12px;
      text-decoration:none;
      font-weight:bold;
      transition:.25s;
    }
    .open { background:#059669; color:white; }
    .download { background:#1d4ed8; color:white; }
    .btn:hover { opacity:.88; transform:translateY(-2px); }
    footer {
      text-align:center;
      margin-top:45px;
      color:#6b7280;
      font-size:14px;
    }
    @media (max-width:600px) {
      body { padding:18px; }
      .book-card h3,.folder-card h3 { min-height:auto; }
    }
    </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div>
        <a class="back" href="../index.html">مرکزی صفحہ</a>
        <a class="back" href="../index.html">واپس</a>
      </div>
      <span class="badge">eMarkaz Books</span>
    </div>

    <section class="hero">
      <h1>ای مرکز کتابیں</h1>
      <h2>eMarkaz Books</h2>
    </section>

    <h2 class="section-title">فولڈرز</h2>
    <section class="folders-grid">

      <article class="folder-card">
        <div class="file-type"><span>📁</span> Folder</div>
        <h3>ای کورسز</h3>
        <p class="english">E-Courses</p>
        <div class="buttons">
          <a class="btn open" href="e-courses/">فولڈر کھولیں →</a>
        </div>
      </article>
    </section>

    <footer>
      <p>© eMarkaz Course Library - Auto-generated page</p>
    </footer>
  </div>
</body>
</html>
